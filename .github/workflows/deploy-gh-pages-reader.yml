# Builds apps/web (base /reader/), assembles _site, pushes to aledquin.github.io:
#   /index.html — landing (github-pages/landing/index.html)
#   /reader/** — app dist
# keep_files: true keeps other files on the Pages branch (if any).
#
# Manual setup (cannot be automated in-repo):
# 1. Repo `aledquin/aledquin.github.io` exists; default branch matches `publish_branch` below.
# 2. GitHub Pages: Settings → Pages — Source = Deploy from branch `main`, folder / (root). Do not use artifact-only Pages if you rely on peaceiris commits to `main`.
# 3. PAT with Contents: Read and write on `aledquin/aledquin.github.io` only.
# 4. In THIS repo: Actions secret `GH_PAGES_TOKEN` = that PAT.
# 5. Push to `main`/`master` or run this workflow manually.

name: Deploy reader to GitHub Pages

# Opt into Node.js 24 for JS actions before GitHub’s default switch (see GitHub changelog).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/web/**'
      - 'github-pages/**'
      - '.github/workflows/deploy-gh-pages-reader.yml'
  workflow_dispatch:

concurrency:
  group: deploy-gh-pages-reader
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: apps/web/.nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install and build
        working-directory: apps/web
        run: |
          npm ci
          npm run build:gh-pages

      - name: Assemble site (landing + reader app)
        run: |
          mkdir -p _site/reader
          cp -a apps/web/dist/. _site/reader/
          cp github-pages/landing/index.html _site/index.html
          : > _site/.nojekyll

      # v4 still declares `node20` in action.yml; env above mitigates until a newer release.
      - name: Push to aledquin.github.io
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          personal_token: ${{ secrets.GH_PAGES_TOKEN }}
          external_repository: aledquin/aledquin.github.io
          publish_branch: main
          publish_dir: ./_site
          destination_dir: ''
          keep_files: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: 'deploy: progressive reader (site + /reader/)'
          enable_jekyll: false
